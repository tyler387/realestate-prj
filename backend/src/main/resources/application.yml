server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/realestate
    username: realestate
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

external:
  public-data:
    service-key: ${PUBLIC_DATA_API_KEY}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY}

logging:
  level:
    com.realestate.collect: INFO
