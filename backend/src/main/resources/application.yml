server:
  port: ${PORT:8081}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/realestate}
    username: ${DB_USERNAME:realestate}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

external:
  public-data:
    service-key: ${PUBLIC_DATA_API_KEY}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY}

logging:
  level:
    com.realestate.collect: INFO
